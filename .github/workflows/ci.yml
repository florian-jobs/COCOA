name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Build demo index
        run: uv run python -m examples.build_demo_db

      - name: Build real index
        run: uv run python -m examples.build_real_index

      - name: Run tests
        run: uv run pytest -v
